[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'php artisan config:cache && php artisan route:cache && php artisan migrate --force && php artisan db:seed --force && php artisan storage:link --force || true && /usr/bin/supervisord -c /etc/supervisor/conf.d/supervisord.conf'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
