[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'php artisan config:cache && php artisan route:cache && php artisan migrate --force && php artisan storage:link --force || true && php artisan serve --host=0.0.0.0 --port=${PORT:-8000}'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
